name: Build-AhmedGram
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # تحميل الـ SDK بطريقة مباشرة ومضمونة
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o ~/sdk.tar.xz
          tar -xf ~/sdk.tar.xz -C ~/theos/sdks
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build Ahmed-Gram
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
          
      - name: Save Tweak
        uses: actions/upload-artifact@v4
        with:
          name: Ahmed-Gram-Tweak
          path: packages/*.deb
